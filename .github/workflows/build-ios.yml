name: Générer un fichier IPA iOS
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installer dépendances Capacitor
        run: |
          cd matec_capacitor_ios
          npm install
          echo "✅ npm install OK"

      - name: Capacitor sync iOS
        run: |
          cd matec_capacitor_ios
          npx cap sync ios
          echo "✅ cap sync OK"

      - name: Installer CocoaPods
        run: |
          cd matec_capacitor_ios/ios/App
          pod install --repo-update
          echo "✅ CocoaPods OK"

      - name: Build Xcode sans signature
        run: |
          cd matec_capacitor_ios
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath $RUNNER_TEMP/MATEC_Wallet.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            -allowProvisioningUpdates
          echo "✅ Archive créée"

      - name: Lister l'archive
        run: |
          echo "=== Archive ===" 
          ls -lh $RUNNER_TEMP/
          find $RUNNER_TEMP -name "*.xcarchive" -type d
          echo "✅ Archive disponible"

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: MATEC-Wallet-iOS-Archive
          path: ${{ runner.temp }}/MATEC_Wallet.xcarchive
          retention-days: 30
