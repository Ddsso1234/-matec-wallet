name: Build iOS IPA
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Capacitor
        run: cd ios-capacitor && npm install
      - name: Capacitor sync
        run: cd ios-capacitor && npx cap sync ios
      - name: CocoaPods
        run: cd ios-capacitor/ios/App && pod install --repo-update
      - name: Import certificate
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        run: |
          echo "$IOS_CERTIFICATE_BASE64" | base64 --decode > cert.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import cert.p12 -k build.keychain -P "$IOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
      - name: Import provisioning profile
        env:
          IOS_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$IOS_PROFILE_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision
      - name: Build & Archive
        run: |
          cd ios-capacitor/ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Release \
            -archivePath $RUNNER_TEMP/App.xcarchive archive \
            CODE_SIGN_IDENTITY="${{ secrets.IOS_CODE_SIGN_IDENTITY }}" \
            PROVISIONING_PROFILE_SPECIFIER="${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}"
      - name: Export IPA
        run: |
          cat > /tmp/export.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <plist version="1.0"><dict>
            <key>method</key><string>ad-hoc</string>
            <key>teamID</key><string>${{ secrets.APPLE_TEAM_ID }}</string>
          </dict></plist>
          PLIST
          xcodebuild -exportArchive -archivePath $RUNNER_TEMP/App.xcarchive \
            -exportPath $RUNNER_TEMP/IPA -exportOptionsPlist /tmp/export.plist
      - uses: actions/upload-artifact@v4
        with:
          name: MATEC-Wallet-IOS-IPA
          path: ${{ runner.temp }}/IPA/*.ipa
          retention-days: 30
