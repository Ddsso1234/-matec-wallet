name: Générer des APK et AAB pour Android
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Afficher la structure
        run: |
          echo "=== Contenu du dépôt ==="
          ls -la
          echo "=== Dossier matec_capacitor_ios ==="
          ls matec_capacitor_ios/ || echo "Absent"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installer Capacitor
        run: |
          cd matec_capacitor_ios
          npm install

      - name: Capacitor sync Android
        run: |
          cd matec_capacitor_ios
          npx cap sync android || echo "⚠️ Sync android ignoré"
        continue-on-error: true

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK debug
        run: |
          cd matec_capacitor_ios/android || exit 0
          chmod +x gradlew
          ./gradlew assembleDebug
        continue-on-error: true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MATEC-Wallet-APK
          path: matec_capacitor_ios/android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
        continue-on-error: true
