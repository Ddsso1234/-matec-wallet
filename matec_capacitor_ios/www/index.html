<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MATEC Wallet</title>
    <style>
        body { margin: 0; background: #0D3D0D; display: flex;
               justify-content: center; align-items: center;
               height: 100vh; font-family: sans-serif; color: #F5A800; }
        .loader { text-align: center; }
        .logo { font-size: 3rem; font-weight: 900; color: #F5A800; }
        .sub  { color: rgba(255,255,255,.7); margin-top: 8px; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(245,168,0,.2);
                   border-top: 4px solid #F5A800; border-radius: 50%;
                   animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader">
        <div class="logo">MATEC</div>
        <div class="sub">Wallet</div>
        <div class="spinner"></div>
        <div class="sub">Connexion en cours...</div>
    </div>
    <script>
        // Rediriger vers le serveur Odoo après 1 seconde
        setTimeout(function() {
            window.location.href = 'https://matec.site/my/matec-wallet';
        }, 1000);
    </script>
</body>
</html>
